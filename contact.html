<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Contact - Glow Queen</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
body { font-family: Arial, sans-serif; }
</style>

</head>

<body class="bg-pink-50">

<!-- NAVBAR -->
<header class="flex justify-between items-center p-4 bg-white shadow">
  <h2 class="text-xl font-bold text-pink-500">Glow Queen</h2>
  <nav class="flex gap-6">
    <a href="index.html">Home</a>
    <a href="product.html">Product</a>
    <a href="contact.html">Contact</a>
  </nav>
</header>

<!-- CONTACT SECTION -->
<section class="py-20 px-6 text-center">
  
  <h1 class="text-4xl font-bold mb-4">Contact Us</h1>
  <p class="mb-8 text-gray-600">Have questions? We'd love to hear from you 💕</p>

  <div class="mb-8">
    <p>Email: glowqueen@gmail.com</p>
    <p>Phone: 0812-3456-7890</p>
    <p>Jakarta, Indonesia</p>
  </div>

  <form class="max-w-md mx-auto flex flex-col gap-4">
    <input type="text" placeholder="Your Name" class="p-3 border rounded-lg"/>
    <input type="email" placeholder="Your Email" class="p-3 border rounded-lg"/>
    <textarea placeholder="Your Message" class="p-3 border rounded-lg h-32"></textarea>
    <button class="bg-pink-400 text-white p-3 rounded-lg font-bold">
      Send Message
    </button>
  </form>

</section>

<!-- FOOTER -->
<footer class="text-center py-6 bg-white mt-10">
  <p>© 2024 Glow Queen</p>
</footer>

</body>
</html>
